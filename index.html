<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Cosméticos - Angilene</title>

    <!-- SEO e Metatags -->
    <meta name="description" content="Catálogo exclusivo de kits de cosméticos de alta qualidade.">

    <!-- Google Fonts: Inter e Playfair Display para um visual premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Cabeçalho -->
    <header class="header">
        <div class="header-container">
            <img class="Logosimbol" src="img/VerticialLogoTransparente.png" alt="">

            <p class="subtitle">Beleza, Cuidado e Sofisticação em cada detalhe.</p>
        </div>
    </header>

    <!-- Seção Principal de Produtos -->
    <main class="catalog-section">
        <div class="catalog-container">
            <h2 class="section-title">Kits Dia das <span>Mães</span></h2>

            <!-- Barra de Pesquisa -->
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar kit por nome...">
            </div>

            <div class="products-grid">
                <!-- Os cards de produtos serão gerados aqui dinamicamente pelo JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 Angilene Cosméticos. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Script JavaScript para o WhatsApp -->
    <script src="app.js"></script>
</body>

</html>
